<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Màn Hình Nhân Viên - Print Layout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="print-layout.css?v=3">
  <style>
    body {
      background-color: var(--pl-bg);
      color: var(--pl-text);
      font-family: var(--pl-font);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .staff-container {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .staff-card {
      background: var(--pl-bg-panel);
      border: 1px solid var(--pl-border);
      border-radius: var(--pl-radius-lg);
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .staff-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--pl-border);
      padding-bottom: 10px;
    }
    .staff-card-title {
      font-weight: 600;
      color: var(--pl-accent);
      font-size: 16px;
    }
    .staff-card-subtitle {
      font-size: 12px;
      color: var(--pl-text-muted);
    }
    .staff-card-canvas {
      width: 100%;
      aspect-ratio: 1 / 1.418;
      background: #fff;
      border-radius: var(--pl-radius-sm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staff-card-canvas canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: var(--pl-text-muted);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="pl-header">
    <div class="pl-header-left">
      <div class="pl-logo" style="margin-left: 10px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="url(#plGrad)" stroke-width="2"/>
          <defs><linearGradient id="plGrad" x1="0" y1="0" x2="24" y2="24">
            <stop stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
          </linearGradient></defs>
        </svg>
        <span>Staff <em>View</em></span>
        <span id="headerBranchName" style="margin-left:15px; padding-left:15px; border-left:1px solid var(--pl-border); color:#a1a1aa; font-weight:500; font-size:14px; display:none;"></span>
      </div>
    </div>
    <div class="pl-header-center">
      <span style="font-size: 14px; color: var(--pl-text-muted);">Hiển thị các phiên chụp đã hoàn thành (Bước 4)</span>
    </div>
    <div class="pl-header-right">
      <button id="btnLogout" class="pl-btn" style="background:var(--pl-bg-section); border:1px solid var(--pl-border); margin-right:10px;" title="Đăng xuất khỏi chi nhánh này">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <div class="staff-container" id="staffGrid">
    <div class="empty-state">Đang kết nối đến máy chủ...</div>
  </div>

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" style="position:fixed; inset:0; background:var(--pl-bg); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div style="background:var(--pl-bg-panel); padding:30px; border-radius:12px; border:1px solid var(--pl-border); text-align:center; max-width:400px; width:90%;">
      <h2 style="margin:0 0 10px 0; color:var(--pl-accent);">Đăng Nhập Nhân Viên</h2>
      <p style="color:var(--pl-text-muted); margin-bottom:20px; font-size:14px;">Nhập mã chi nhánh và mật khẩu để xem ảnh</p>
      
      <input type="text" id="loginBranch" placeholder="Mã chi nhánh (vd: hangkhay)" style="width:100%; padding:12px; margin-bottom:15px; background:var(--pl-bg); border:1px solid var(--pl-border); border-radius:8px; color:var(--pl-text); font-family:var(--pl-font);">
      <input type="password" id="loginPassword" placeholder="Mật khẩu" style="width:100%; padding:12px; margin-bottom:20px; background:var(--pl-bg); border:1px solid var(--pl-border); border-radius:8px; color:var(--pl-text); font-family:var(--pl-font);">
      
      <button id="btnLoginSubmit" class="pl-btn pl-btn-primary" style="width:100%; padding:12px; justify-content:center; font-weight:bold;">Đăng Nhập</button>
      <div id="loginError" style="color:#ef4444; font-size:13px; margin-top:10px; display:none;">Sai mã chi nhánh hoặc mật khẩu!</div>
    </div>
  </div>

  <script src="js/staff.js?v=1"></script>
</body>
</html>
