<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tải Ảnh - LL Photobooth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f5ee;
      --bg-panel: #eee8dc;
      --bg-card: #ffffff;
      --text: #2b1b10;
      --text-muted: #7c6452;
      --accent: #4f3219;
      --accent-hover: #3b2411;
      --border: #dcd2c0;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    .header {
      background: var(--bg-panel);
      padding: 18px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(79, 50, 25, 0.05);
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
    }
    .container {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .photo-item {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(79, 50, 25, 0.08);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .photo-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 50, 25, 0.12);
    }
    .photo-item img {
      width: 100%;
      aspect-ratio: 3/2;
      object-fit: contain;
      background: #ffffff;
      display: block;
      padding: 8px;
    }
    .download-btn {
      display: block;
      padding: 12px;
      text-align: center;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border-radius: 0;
      transition: background 0.15s ease;
    }
    .download-btn:hover {
      background: var(--accent-hover);
    }
    #btnDownloadAll {
      background: var(--accent);
      color: #ffffff;
      border-radius: 10px;
      font-size: 15px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(79, 50, 25, 0.2);
    }
    #btnDownloadAll:hover {
      background: var(--accent-hover);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    /* Lightbox CSS */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .lightbox-controls {
      display: flex;
      gap: 15px;
    }
    .lightbox-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .lightbox-btn.close {
      background: #444;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <header class="header" style="display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px 16px;">
    <div style="background: var(--accent, #4f3219); padding: 8px 18px; border-radius: 10px; box-shadow: 0 4px 14px rgba(79, 50, 25, 0.25);">
      <img src="https://llphotobooth.vn/uploads/images/logo.webp" alt="LL Photobooth" style="height: 36px; width: auto; display: block;" />
    </div>
    <h1 style="font-size: 18px; margin: 0;">Cảm ơn bạn đã chụp ảnh tại LL Photobooth!</h1>
  </header>

  <div class="container">
    <p style="text-align: center; color: var(--text-muted); font-size: 14px;">Nhấn vào nút Tải Xuống bên dưới mỗi tấm ảnh để lưu về máy.</p>
    
    <button id="btnDownloadAll" class="download-btn" style="width: 100%; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; display: none;">Tải Toàn Bộ Ảnh</button>
    
    <div id="loading" class="loading">Đang tải ảnh...</div>
    
    <div id="photoGrid" class="photo-grid"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <img id="lightboxImg" src="" alt="Zoomed Photo">
    <div class="lightbox-controls">
      <a id="lightboxDownload" href="" download class="lightbox-btn">Tải Xuống</a>
      <button id="lightboxClose" class="lightbox-btn close">Đóng</button>
    </div>
  </div>

  <script>
    // Lightbox Logic
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxDownload = document.getElementById('lightboxDownload');
    const lightboxClose = document.getElementById('lightboxClose');

    lightboxClose.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('active');
      }
    });

    function openLightbox(src, filename) {
      lightboxImg.src = src;
      lightboxDownload.href = src;
      lightboxDownload.download = filename;
      lightbox.classList.add('active');
    }

    async function loadPhotos() {
      const params = new URLSearchParams(window.location.search);
      const branch = params.get('branch');
      const room = params.get('room');
      const session = params.get('session');
      
      const grid = document.getElementById('photoGrid');
      const loading = document.getElementById('loading');

      if (!branch || !room || !session) {
        loading.innerText = 'Đường dẫn không hợp lệ.';
        return;
      }

      try {
        const res = await fetch(`/api/download/${branch}/${room}/${session}`);
        if (!res.ok) throw new Error('Không tìm thấy ảnh');
        
        const data = await res.json();
        
          if (data.images && data.images.length > 0) {
            loading.style.display = 'none';
            data.images.forEach((imgUrl, i) => {
              const item = document.createElement('div');
              item.className = 'photo-item';
              item.style.cursor = 'pointer'; // Make it look clickable
              
              const cacheBustUrl = imgUrl + '?v=' + Date.now();
              const img = document.createElement('img');
              img.src = cacheBustUrl;
              
              const filename = `LL_Photobooth_${session}_${i+1}`;
              
              item.addEventListener('click', () => {
                openLightbox(cacheBustUrl, filename);
              });
              
              item.appendChild(img);
              grid.appendChild(item);
            });

            // Show download all button
            const btnDownloadAll = document.getElementById('btnDownloadAll');
            btnDownloadAll.style.display = 'block';
            btnDownloadAll.addEventListener('click', async () => {
              btnDownloadAll.innerText = 'Đang nén file (0%)...';
              btnDownloadAll.disabled = true;
              try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                
                for (let i = 0; i < data.images.length; i++) {
                  const url = data.images[i];
                  const filename = url.split('/').pop();
                  const response = await fetch(url);
                  const blob = await response.blob();
                  zip.file(filename, blob);
                  btnDownloadAll.innerText = `Đang nén file (${Math.round(((i + 1) / data.images.length) * 100)}%)...`;
                }

                btnDownloadAll.innerText = 'Đang tạo file tải xuống...';
                const zipBlob = await zip.generateAsync({type: "blob"});
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = `LL_Photobooth_${session}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                btnDownloadAll.innerText = 'Tải Toàn Bộ Ảnh (ZIP)';
              } catch (err) {
                console.error(err);
                alert('Có lỗi xảy ra khi tạo file zip!');
                btnDownloadAll.innerText = 'Tải Toàn Bộ Ảnh (Lỗi)';
              } finally {
                btnDownloadAll.disabled = false;
              }
            });
          } else {
            loading.innerText = 'Chưa có ảnh nào trong phiên này.';
          }
        } catch (err) {
          loading.innerText = 'Lỗi tải ảnh: ' + err.message;
        }
      }
      
      window.onload = loadPhotos;
    </script>
</body>
</html>
