<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoTune Pro — Lightroom-style Web Editor</title>
  <meta name="description" content="Professional photo editing tool for product, real estate, food, and lifestyle photography. Lightroom-style adjustments in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="url(#logoGrad)" stroke-width="2"/>
            <path d="M12 6L12 18M6 12L18 12" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24">
              <stop stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
            </linearGradient></defs>
          </svg>
          <span>PhotoTune <em>Pro</em></span>
        </div>
      </div>
      <div class="header-center">
        <button class="toolbar-btn" id="btnOpen" title="Open Image (Ctrl+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 15v4a2 2 0 002 2h14a2 2 0 002-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <span>Open</span>
        </button>
        <button class="toolbar-btn" id="btnBefore" title="Hold to compare (Space)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          <span>Before / After</span>
        </button>
        <button class="toolbar-btn" id="btnReset" title="Reset All">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.3-11.44L1 10"/></svg>
          <span>Reset</span>
        </button>
        <button class="toolbar-btn" id="btnZoomFit" title="Fit to screen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          <span>Fit</span>
        </button>
      </div>
      <div class="header-right">
        <span class="file-info" id="fileInfo">No image loaded</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Thumbnail Sidebar -->
      <aside class="sidebar-left" id="thumbnailSidebar" style="display: none;">
        <div class="sidebar-header">
          <h3>Photos</h3>
          <button id="btnAddMore" class="btn-icon" title="Add more photos">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="thumbnail-list" id="thumbnailList">
          <!-- Thumbnails injected here -->
        </div>
      </aside>

      <!-- Preview Area -->
      <div class="preview-area" id="previewArea">
        <div class="drop-zone" id="dropZone">
          <div class="drop-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <h2>Drop your image here</h2>
            <p>or click to browse — supports JPG, PNG, WebP</p>
          </div>
        </div>
        <canvas id="previewCanvas"></canvas>
        <div class="preview-info" id="previewInfo"></div>
      </div>

      <!-- Controls Panel -->
      <aside class="controls-panel" id="controlsPanel">
        <!-- Presets -->
        <section class="panel-section presets-section">
          <div class="section-header" data-toggle="presets">
            <h3>✦ Presets</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body" id="presetsBody">
            <div class="preset-grid" id="presetGrid"></div>
          </div>
        </section>

        <!-- LUT Presets -->
        <section class="panel-section lut-section">
          <div class="section-header" data-toggle="lut">
            <h3>🎞️ LUT Presets</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body">
            <button class="lut-import-btn" id="btnImportLut">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              Import .cube LUT
            </button>
            <div class="lut-list" id="lutList">
              <div class="lut-empty" id="lutEmpty">No LUTs imported yet</div>
            </div>
            <div class="slider-row lut-intensity-row" data-param="lutIntensity" style="display:none" id="lutIntensityRow">
              <label>Intensity</label>
              <input type="range" min="0" max="100" value="100" step="1">
              <span class="value">100</span>
            </div>
          </div>
        </section>

        <!-- Basic -->
        <section class="panel-section">
          <div class="section-header" data-toggle="basic">
            <h3>☀ Basic</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body">
            <div class="slider-row" data-param="exposure">
              <label>Exposure</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="contrast">
              <label>Contrast</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="highlights">
              <label>Highlights</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="shadows">
              <label>Shadows</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="whites">
              <label>Whites</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="blacks">
              <label>Blacks</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
          </div>
        </section>

        <!-- Color -->
        <section class="panel-section">
          <div class="section-header" data-toggle="color">
            <h3>🎨 Color</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body">
            <div class="slider-row" data-param="temperature">
              <label>Temperature</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="tint">
              <label>Tint</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="vibrance">
              <label>Vibrance</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="saturation">
              <label>Saturation</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="hue">
              <label>Hue</label>
              <input type="range" min="-180" max="180" value="0" step="1">
              <span class="value">0</span>
            </div>
          </div>
        </section>

        <!-- Detail -->
        <section class="panel-section">
          <div class="section-header" data-toggle="detail">
            <h3>🔍 Detail</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body">
            <div class="slider-row" data-param="texture">
              <label>Texture</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="clarity">
              <label>Clarity</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="dehaze">
              <label>Dehaze</label>
              <input type="range" min="-100" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="sharpness">
              <label>Sharpness</label>
              <input type="range" min="0" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
            <div class="slider-row" data-param="noiseReduction">
              <label>Noise Reduction</label>
              <input type="range" min="0" max="100" value="0" step="1">
              <span class="value">0</span>
            </div>
          </div>
        </section>

        <!-- Export -->
        <section class="panel-section export-section">
          <div class="section-header" data-toggle="export">
            <h3>📦 Export</h3>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="section-body">
            <div class="export-row">
              <label>Format</label>
              <div class="format-buttons">
                <button class="format-btn active" data-format="jpeg">JPG</button>
                <button class="format-btn" data-format="webp">WebP</button>
                <button class="format-btn" data-format="png">PNG</button>
              </div>
            </div>
            <div class="slider-row" data-param="exportQuality">
              <label>Quality</label>
              <input type="range" min="10" max="100" value="92" step="1">
              <span class="value">92</span>
            </div>
            <div class="export-row">
              <label>Resize</label>
              <div class="resize-inputs">
                <input type="number" id="resizeWidth" placeholder="Width" min="1">
                <span class="resize-lock" id="resizeLock" title="Lock aspect ratio">🔗</span>
                <input type="number" id="resizeHeight" placeholder="Height" min="1">
              </div>
            </div>
            <button class="export-btn" id="btnExport">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              Download
            </button>
            <div class="sidebar-footer">
              Powered by <strong>MMe</strong> (MMe.vn)
            </div>
          </div>
        </section>
      </aside>
    </main>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <input type="file" id="lutFileInput" accept=".cube,.CUBE" hidden>

    <!-- Processing indicator -->
    <div class="processing-overlay" id="processingOverlay">
      <div class="processing-spinner"></div>
      <span>Processing...</span>
    </div>
  </div>

  <script type="module" src="js/presets.js"></script>
  <script type="module" src="js/processor.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
